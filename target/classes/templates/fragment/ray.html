<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<body>

<div th:fragment="frag (rayons)">
    <ul >
        <li th:each="rayon : ${rayons}" th:text="${rayon.namerayon}"></li>
    </ul>
</div>

<div th:fragment="frag1 (rayons, users)">

    <input type="text" name="login" placeholder="Логин">
    <input type="text" name="password" placeholder="Пароль">
    <input type="text" name="name" placeholder="Имя">
    <select id="selectray">
        <option id="usr" th:replace="fragment/ray :: frag2 (${rayons})"></option>
    </select>

    <button id="bt2" >Добавить</button>

        <div th:each="user : ${users}">
            <span th:text="${user.name}"></span>
            <span th:text="${user.rayon.namerayon}"></span>
        </div>

</div>

<option th:fragment="frag2 (rayons)" th:each="rayon : ${rayons}" th:value="${rayon.id}"
        th:text="${rayon.namerayon}"></option>


</body>
</html>
